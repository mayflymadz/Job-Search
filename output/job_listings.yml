    Demonstrated experience developing, implementing, and maintaining H&S programs,
    policies, procedures, and risk assessments.· Experience supporting or maintaining
    an ISO 45001 or equivalent management system is strongly preferred.· Advanced
    proficiency in Microsoft Excel; experience with Power BI or other data visualization
    tools is preferred.· Experience analysing incident trends, corrective actions,
    audits, and leading indicators to drive continuous improvement.· Strong written
    and verbal communication skills, with the ability to influence stakeholders at
    all levels of the organization.· Self-directed, accountable, and comfortable owning
    decisions and outcomes.· Ability to work independently while collaborating cross-functionally
