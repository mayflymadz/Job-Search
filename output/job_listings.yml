    moments that get everyone talking. With studios in New York and London, we offer
    creative impact on a global scale.Your Creative Process:As a Senior Graphic Designer
    at Acrylicize, you will be contributing to the entire lifecycle of a project,
    from concept through to completion, working closely with the wider Design Team,
    Production Team and fabrication partners. This role requires a conceptual thinker
    that can confidently articulate their ideas and bring them to life in a diverse
    range of spaces. Previous experience in illustration and environmental graphic
    design is crucial and we’d love to see examples of these projects and your creative
    process in your portfolio.We give Designers the freedom and space to play, there
    are client deliverables to meet within our Creative Process but how you get to
    these is up to you.Our Creative Process:Phase 1: Discover - Understanding the
    brief, the client and the space. Researching themes and narratives to inspire
    the designs.Phase 2: Design - Creating concepts derived from the chosen theme
    for the space. We call these idea cards, they are loose, sketchy and conceptual.
    The chosen ideas are then refined further.Phase 3: Develop - Developing the chosen
    ideas, considering materiality and creating fully formed designs ready to be artworked,
    fabricated and installed.Phase 4: Detail (Production Team)Phase 5: Deliver (PM
    Team)A typical week for a Senior Graphic Designer might include:Heading to site
    to get a feel for a space and meet a new clientWorking into a Lead Designer or
    Design Director on 2-3 projects across the week, ranging from one off reception
    pieces through to working with a team on large schemes with multiple artworksReviewing
