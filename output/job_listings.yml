    to the Production TeamTaking time out for Creative Cuisine – we give our team
    half a day each month to spend going to galleries or following their creative
    pursuits to stay inspiredProviding mentorship to more junior members of your project
    teamYou must have:Requirements & SkillsA degree in Graphic Design or equivalentAbility
    to demonstrate critical thinkingAbility to meet deadlines under pressureAbility
    to carry out tasks independently and efficientlyGreat attention to detailA keen
    interest in learning and mentoring junior studio membersExcellent organisational
    skills that support the rest of the team and align with studio standardsStrong
    written and verbal communication skillsA passion for quality in every endeavourExcellent
    team player attitudeConsistency in quality of work across projects and stagesWillingness
    to listen to feedback and use it to improveA hunger to constantly improve the
    studio’s outputExcellent knowledge of Adobe Creative SuiteBenefits10 days paid
    vacation (increasing with tenure)11 bank holidays4 additional days off between
    Christmas and New YearGold-standard health, dental, and vision insurance401(k)
    eligibility after 3 monthsHybrid working modelHalf a day per month dedicated to
