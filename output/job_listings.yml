- company: Magnificent Noise
  description: About YouWe're looking for the right combination of distinctive editorial
    judgment, strong visual storytelling instincts, excellent technical editing skills,
    and high emotional intelligence. The Video Editor will have a deep appreciation
    for long-form, conversation-driven storytelling and understand how video can extend
    and support audio—not overwhelm it.You are someone who knows that great editing
    is often invisible. You have strong opinions about pacing, restraint, and clarity,
    and you understand why certain moments deserve visual emphasis while others are
    better left alone. You are as comfortable working from raw conversations as you
    are shaping finished work, and you enjoy collaborating closely with producers,
    editors, and sound designers.About UsMagnificent Noise is a premier podcast production
    company based in New York City. We create distinctive podcasts and audio content
    that expand the boundaries of what others think is possible. We are a boutique
    production house and consulting company, built intentionally on an intimate scale.
    In all of our work we form creative alliances, collaborating as trusted partners
    to make very singular projects. We produce projects that people talk about. Our
    projects help listeners see the world in a different way. Our work sparks conversations
    we all need to be having.Our team has built a consistent track record in audio
    and podcasting matched by few. We make shows that redefine their categories, routinely
    top the charts, appear on "best of" lists, win awards, and collectively reach
    hundreds of millions of listeners.While audio is our core medium, video has become
    an increasingly important extension of our work—supporting podcast launches, audience
    growth, and partner goals. We approach video with the same discipline, intentionality,
    and editorial standards that define our audio work.Brief DescriptionThe Video
    Editor is a critical role on a small, senior team at Magnificent Noise. This is
    a part-time position (15-20 hours per week) with flexible work hours and a hybrid
    structure—primarily remote, with occasional on-site work as projects require.The
    Video Editor will be the primary editor shaping video expressions of our audio-led
    projects, ensuring that all visual work meets our editorial ambitions and aesthetic
    standards.The role requires not only strong technical editing skills, but a creative
    and inclusive approach to storytelling. The ideal candidate understands how to
    translate long-form audio conversations into compelling visual narratives and
    has a proven track record of producing high-quality work under deadline in a collaborative
    environment.This is not a high-volume social media production role. It is a craft
    role for someone who values judgment, pacing, and intention.Top candidates for
    this role will demonstrate curiosity, a strong work ethic, exceptional journalistic
    and storytelling instincts, and exercise creativity in their production technique.
    The role requires a creative and inclusive approach to conversations and storytelling
    and an ability to shape the vision and execution of ambitious podcast projects.
    The Editor will be part of a dynamic team, which requires flexibility, patience,
    and the ability to complete tasks independently. They reliably create original
    and enterprising work in every episode they produce.Key ResponsibilitiesCollaborate
    with producers and editors during editorial planning to advise on video capture,
    framing, and coverage needsEdit full-length video podcasts, interviews, and conversations,
    ensuring pacing, tone, and clarity align with editorial goalsShape short-form
    video excerpts and promotional cutdowns that grow naturally out of long-form audio
    workEstablish and maintain consistent visual standards across projects and partnersEnsure
    audio-video sync, basic color correction, and overall technical polish meet Magnificent
    Noise standardsThink beyond execution to help determine what should become video—and
    howParticipate in creative discussions about how video supports audience growth,
    distribution, and storytellingManage multiple projects simultaneously while meeting
    deadlines and maintaining qualityOther duties as assignedLOCATIONOur preference
    for this position is for someone from the greater New York area working in our
    Manhattan office 1 or 2 days a week, but will consider a fully-remote employee
    with exceptional skill.Pay rate is $65-85 per hour, average of 20 hours per week.RequirementsNECESSARY
    KNOWLEDGE, SKILLS, AND ABILITIES3-5+ years of professional video editing experience,
    preferably in podcasting, documentary, or interview-based workStrong editorial
    instincts and an ability to shape long conversations into coherent visual storiesDeep
    comfort working from audio-first materialDemonstrated expertise with professional
    editing software (Premiere Pro, Final Cut Pro, or equivalent)Experience creating
    short-form video for distribution across platforms, without relying on gimmicks
    or trendsAbility to work efficiently under deadline pressureExcellent oral and
    written communication skillsThrives in a collaborative, team-focused environmentMust
    be eligible to work in the United StatesNICE TO HAVES:Familiarity with podcast
    production workflows and audio post-productionBasic motion graphics or titling
    skillsUnderstanding of video distribution strategies across platforms such as
    YouTube, Instagram, TikTok, and LinkedInBenefitsMagnificent Noise offers excellent
    benefits, including a 401k contribution, health care, and other benefits.Show
    moreShow less
