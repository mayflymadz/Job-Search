  description: Zara is a forward-thinking force in fashion; embodying what is possible
    when responsibility and aspiration are accessible to all. By bringing more thoughtful
    style to the world, we aim to provide everyone, no matter where they are, with
    the inspiringly beautiful, always on-trend, responsibly crafted fashion they deserve.The
    Health & Safety Manager leads the implementation of safety strategy, programs,
    and compliance across companies of the INDITEX Group operating in the United States
    and Puerto Rico. This role is responsible for driving a proactive safety culture,
    ensuring regulatory compliance, managing risk at an organizational level, and
    partnering with senior leadership, operations, HR, and external stakeholders to
    continuously improve workplace health and safety performance.· Lead and continuously
    improve the company’s occupational health and safety management system across
    all retail and office locations in the United States and Puerto Rico.· Report
    directly to the Head of People Controls, ensuring alignment with HR governance,
    strategic priorities, and enterprise health and safety objectives.· Direct and
    validate enterprise-wide risk assessments/inspections, including those conducted
    by third-party prevention services, ensuring findings are integrated into strategic
    planning and operational controls.· Ensure compliance with all applicable federal,
    state, and local health and safety legislation, and proactively identify regulatory
    changes that may impact operations.· Maintain the company’s ISO 45001 certification
    and World Health Organization Healthy Workplace certification, including audit
    preparation, corrective actions, and continuous improvement initiatives.· Develop,
    implement, and monitor preventative health and safety programs to address identified
    risks and non-conformities.· Manage the health and safety training strategy, ensuring
    appropriate content, delivery, tracking, and effectiveness for all employee groups.·
    Manage and provide oversight of incident and accident investigation processes,
    ensuring accuracy, consistency, root-cause analysis, and the implementation of
    corrective and preventative actions.· Review and approve incident reports and
    ensure accountability for corrective action execution across departments and store
    management teams.· Monitor and analyze health & safety performance metrics, trends,
    and KPIs to drive data-informed decision-making and leadership reporting.· Oversee
