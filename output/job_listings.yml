    compensation administration, employee relations, and employee events, while contributing
    to projects that strengthen our culture and operations. If you’re passionate about
    people, thrive in a fast-paced team environment, and want to help build a workplace
    where great teams win together, we want you on our roster.Responsibilities and
    Duties:Manages communication and tactical execution of employee benefits, including
    but not limited to health insurance, voluntary/opt-in benefits, COBRA, PTO, and
    Company Holidays, while serving as primary liaison with benefits broker and multiple
    third-party vendors.Develops monthly Employee Wellness Program initiatives, including
    contracting vendors, managing budget, and day of event execution.Reviews, audits,
    and processes weekly enrollment and monthly benefits billing.Administers the leave
    of absence program, including distributing and collecting required paperwork and
    communicating leaves internally.Leads the interactive process for ADA Accommodations.Interfaces
    with Risk Manager to provide information for Workers’ Compensation claims and
    to coordinate compliance with California required Heat Illness Prevention PlanEnsures
    regulatory compliance by overseeing timely and accurate filing of Form 5500, EEO-1
    reports, California Pay Data Reporting, ACA reporting, and other federal, state,
    and local employment compliance requirements.Conducts and compiles People Operations
    analytics, including turnover trends, employee survey insights, People Operations
    calendar, and workplace/event utilization.Executes and manages employee engagement
    events, including monthly team huddles, in-season celebrations, and ad hoc experiences.Conducts
    first-day onboarding presentations, maintains and updates onboarding materials,
    and distributes new employee and benefits-related communications.Assists with
    Employee Relations, including conducting thorough and effective investigations
    and applying policies and discipline fairly and consistently as needed.Assists
    with exit interviews for full-time staff employees.Assists with maintaining records
    in HRIS and timekeeping systems as needed.Provides back-up support for People
    Operations Coordinator.Runs ad hoc reports in HRIS.Maintains up-to-date knowledge
    of HR best practices and applicable employment laws, ensuring processes and reporting
    remain compliant with federal, state, and local requirements.Other duties as assigned.Required
    Abilities and Skills:Demonstrated ability to actively listen and communicate with
    empathy, using both verbal and nonverbal cues to understand employee needs and
    respond thoughtfully.Strong critical thinking and problem-solving skills, with
    the ability to assess information, evaluate situations, and determine appropriate
    solutions.Ability to build trust and credibility by delivering responsive, reliable,
    and people-centered support to employees, leaders, and cross-functional partners.Proven
    ability to develop strong relationships across all levels of an organization through
    authentic, inclusive, and engaging communication.Highly organized with the ability
    to manage multiple priorities, meet deadlines, and execute on key objectives in
    a fast-paced environment.Strong time management and prioritization skills, with
    the ability to balance competing responsibilities while maintaining attention
    to detail.Excellent written and verbal communication skills, with the ability
    to convey information clearly, professionally, and with sound judgment.Education
    and Experience:At least 5-7 years’ relevant work experience; or an equivalent
    combination of education and experience.PHR or SHRM-CP certification preferred.Knowledge
    of computerized information systems and human resources applications.Advanced
    Excel, PowerPoint, and Microsoft Word skills, including the development of complex
    spreadsheets and presentations, and experience preparing, documenting, and presenting
    narrative reports and statistical analyses.Knowledge of current federal and California
    state labor and benefit laws and regulations required.Experience administering
    benefits and leave programs required.Physical Demands and Work Environment:The
    physical demands described here are representative of those that must be met by
    an employee to successfully perform the essential functions of this position.
    Reasonable accommodations may be made to enable individuals with disabilities
    to perform the functions.The employee will be sitting in a typical office environment
    the majority of the time and may be exposed to outdoor weather conditions.The
    employee is frequently required to sit, use hands or fingers, handle or feel objects,
    tools, or controls and reach with hands and arms. The employee is regularly required
