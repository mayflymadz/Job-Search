    and medication management to effectively treat common perinatal mood disorders
    like postpartum depression and anxiety, with 94% of patients seeing a clinically
    significant improvement in their symptoms after completing the program. Seven
    Starling partners with OBGYN clinics across the country and leading health plans
    including UnitedHealthCare, Cigna, Blue Cross Blue Shield, and Aetna to make care
    easily accessible and affordable.About The RoleSeven Starling is revolutionizing
    women''s mental healthcare, and we''re looking for an Enrollment Specialist to
    help scale our world-class clinical team during a period of tremendous growth.
    You will own the full enrollment and credentialing cycle for psychotherapists
    (LCSWs, LPCs, Psy.D, etc.), psychiatric mental health nurse practitioners (PMHNPs),
    and physicians. Joining our small but mighty Network Access team and reporting
    to the Network Access Manager, you''ll have the opportunity to scale our credentialing
    and enrollment function while making a significant impact on women''s mental healthcare.This
    isn''t just another enrollment specialist role - you''ll be a key player to support
    a rapidly growing clinical team that''s transforming how women access mental health
