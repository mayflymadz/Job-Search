    training, and compliance tracking.· Manage relationships with external health
    and safety vendors, consultants, and suppliers, including oversight of internal
    applications used for supplier compliance.· Issue and approve health and safety
    communications, guidance, and memos to ensure consistent application of policies
    and regulatory requirements.· Provide leadership and subject matter expertise
    to HR, Operations, and senior management, including participation in the Executive
    Health and Safety Committee Meetings.· Collaborate with other stakeholders involving
    matters pertaining to workplace violence, business continuity, and other emergency
    situations.· Promote a strong culture of health, safety, and prevention through
    leadership engagement, employee involvement, and continuous improvement initiatives.Experience
    and qualifications· Minimum 5 years of progressive experience in occupational
    health and safety, risk management, or a related field. · Experience in the retail
    industry or multi-location environment strongly preferred, including support of
