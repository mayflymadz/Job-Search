    notes, catalyst previews/recaps, thematic reports, and breaking-news updates.Keep
    the Senior Analyst informed of daily news flow, filings, data releases, and relevant
    market developments; propose implications and next steps quickly.Relationship
    Management (As You Develop)Help maintain and grow relationships with company management
    teams, industry/academic contacts, internal Sales & Trading partners, and institutional
    investors.Contribute thoughtful questions for management meetings and investor
    calls, with a focus on chemistry, CMC readiness, and commercialization feasibility.Requirements
    & Qualifications:Master’s degree in chemical engineering preferred with demonstrated
    strength in applied chemistry (e.g., reaction engineering, separations/purification,
    formulation, analytical characterization, process development/scale-up).Demonstrated
