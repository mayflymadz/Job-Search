  description: Job SummaryThe Child and Family Services Agency (CFSA) is a cabinet-level
    agency within the District of Columbia government, committed to the safety, permanence,
    and well-being of children and families residing in the District of Columbia.
    Charged with protecting child victims and those at risk of abuse and neglect,
    CFSA fosters collaborations within its administrations to deliver exceptional
    family-focused services to the community and its residents.This position internally
    called Health and Wellness Coordinator is in the Office of the Chief of Staff
    (OCS) within the Office of the Director (OD) of the Child and Family Services
    Agency (CFSA). The primary purpose of this position is to oversee, coordinate,
    and implement the management of the agency Health and Wellness Program and to
    act as the main agency liaison to other agencies and third parties regarding health
    and wellness.Duties And ResponsibilitiesThe Health and Wellness Coordinator duties
    and responsibilities include but not limited to:Develops, plans, markets, implements,
    and evaluates agency-wide health and wellness initiatives and programs including
    but not limited to, health promotion programs (e.g., fitness orientations and
    consultations, health screenings and health risk assessments, organizing health
    and fitness fairs, awareness events, motivational programs, and motivational contests).Initiates,
    plans, develops, coordinates, and implements health awareness programs, employee
    recognition and appreciation programs, educational campaigns (e.g., bulletin boards,
    newsletters, lunch and learns, workshops), behavioral change initiatives, health
    assessments/screenings (e.g., biometric events, incentive programs, health fairs),
    smoking cessation, and other similar health and wellness initiatives or programs
    that will benefit employees.Works with insurance carriers to increase the participation
    in lifestyle management programs, and improve the compliance rates for preventive
    screenings.Collaborates with the Human Resources Administration (HRA) team to
    support the onboarding process for new employees.Maintains ongoing communication
    with new hires via Microsoft Teams to facilitate their transition and integration
    into the agency.Conducts regular check-ins with employees to assess their adjustment
    and provides guidance as needed.Offers coaching and support to employees in addressing
    work-related and personal concerns, including making referrals to the Employee
    Assistance Program (EAP) when appropriate.Creates and proposes, and/or modifies
    existing policies and procedures relevant to health and wellness as needed.Compiles
    comprehensive monthly reports on program participation and outcomes and recommends
    ways to improve the programs.Performs benchmarking analysis, environmental and
    culture assessments and surveys to aid in program development. Generates reports
    in wellness program tracking and utilization, risks change, and program analysis.Develops
    and recommends budget for all health and wellness initiatives and programs. Oversees
    and coordinates the management of contracts, budgeting, and procurement related
    to health and wellness.Liaises with other agencies and third parties to gather
    health and wellness related ideas and initiatives, including possible sponsorship.Coordinates
    and works with vending machine suppliers to ensure healthy food choices.Proactively
    contributes to the Wellness Committee Meetings while working on program buy-ins
    and support through all levels of the organization. Maintains a list of volunteers
    that would like to assist with health and wellness activities and coordinates
    subcommittees.Drafts “All-Staff” messaging on agency-wide or Administration-wide
    wellness initiatives or programs as needed.Performs other related duties as assigned.QualificationsExpert
    knowledge of and ability to apply health and wellness theory, concepts, and practices
    in organization-wide scale. Skills in program development, implementation, marketing,
    and promotion. Knowledge of Health Insurance and Portability Act (HIPAA) rules
    and other regulations surrounding health and wellness programs.Comprehensive knowledge
    of research methodologies and ability perform advanced quantitative and qualitative
    analysis to analyze and evaluate the outcomes of health and wellness programs
    and initiatives and recommend modifications and/or improvements to achieve optimal
    impact agency wide.Broad knowledge of health care related principles and practices
    in order to plan, organize, and assess the feasibility and benefits of the proposed
    wellness initiatives and programs.Knowledge of and ability to draft policies and
    procedures related to health and wellness; ability to coordinate and manage health
    and wellness related contracts and procurement with third party service providers.Ability
    to work with and consult with other staff and officers and outside parties to
    generate feedback on specific topics, issues, or projects.Knowledge of the agency
    mission, policies and procedures. Knowledge of concepts, principles, and best
    practices in human resources management as it relates to health and wellness.Knowledge
    of adult learning theories and practices in order to select and use the most appropriate
    methods in effecting behavioral change to target recipients.Excellent oral and
    writing communication skills; ability to present clear and concise reports and
    recommendations.Strong interpersonal, communication, and customer services skills;
