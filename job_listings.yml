    details to business and valuation outcomes.Strong financial aptitude and willingness
    to build expertise in modeling, forecasting, and valuation (advanced Excel required).Excellent
    written and verbal communication skills; ability to explain complex technical
    concepts clearly to non-technical audiences.Highly organized, detail-oriented,
    and able to thrive in a fast-paced, deadline-driven environment.Strong work ethic,
    resourcefulness, and critical/creative thinking.Additional Skills:1–3 years of
    experience in equity research, investment banking, consulting, or biopharma industry
    roles (process development, analytical development, manufacturing/CMC, QA/QC,
    or related).Familiarity with biopharma development and regulatory context as it
    relates to CMC (e.g., comparability, stability programs, method validation concepts).Experience
