- company: Universal Music Group
  description: 'We are UMG, the Universal Music Group. We are the world’s leading
    music company. In everything we do, we are committed to artistry, innovation and
    entrepreneurship. We own and operate a broad array of businesses engaged in recorded
    music, music publishing, merchandising, and audiovisual content in more than 60
    countries. We identify and develop recording artists and songwriters, and we produce,
    distribute and promote the most critically acclaimed and commercially successful
    music to delight and entertain fans around the world.Famehouse, a division of
    UMG, is the preeminent leader in D2C solutions in music, defining & delivering
    the industry’s best-in-class service to connect artists with their fans. Established
    & headquartered in Philly, Fame House powers eCommerce for UMG’s labels, artists,
    and Bravado, along with a select roster of 3rd party clients. Our success & culture
    is fueled by collaboration, both within FH and with our partners. We are passionate
    about the impact of eCommerce for artists, providing a full service solution to
    grow an artist’s owned business including strategy, creative, storefront merchandising,
    fulfillment, customer service, technology, and more.How We LEADMerchandise and
    e-commerce is part of the fabric of music culture. For artists, it’s a way to
    develop and further articulate their brand. For fans, it’s another pathway to
    connecting with an artist and the culture they represent.The Digital Brand Designer
    is responsible for the development and execution of Famehouse’s company brand
    across digital platforms and communications. This role ensures that Famehouse’s
    visual identity is expressed consistently, intelligently, and impactfully across
    owned and operated websites, sales materials, presentations, and digital brand
    touchpoints.Embedded within the Design & Direction team, this role partners closely
    with leadership, Partner Strategy, Marketing, and Industry teams to translate
    business objectives into cohesive brand experiences. The Digital Brand Designer
    will maintain and evolve the Famehouse brand system, ensuring that all outward-facing
    materials reflect the company’s creative ambition, operational sophistication,
    and cultural leadership.This is a systems-driven design role for someone who understands
    that brand is not just aesthetic—it is clarity, consistency, and credibility across
    every interaction.How You’ll CREATEOwn the execution of Famehouse’s digital brand
    identity across presentations, proposals, and internal communications.Design and
    evolve presentation systems used in internal meetings, client pitches, and executive-level
    engagements.Maintain and refine Famehouse’s owned and operated websites, ensuring
    visual consistency and alignment with brand standards.Translate brand guidelines
    into scalable digital templates and reusable systems.Partner with Partner Strategy
    and Industry teams to elevate commercial materials and storytelling frameworks.Ensure
    brand consistency across typography, layout, motion elements, and digital components.Collaborate
    with UX/UI teams when corporate web functionality intersects with brand presentation.Create
    adaptable toolkits and templates to improve efficiency and reduce one-off design
    requests.Contribute to periodic brand refresh initiatives as the company evolves.Maintain
    organized brand assets and documentation to ensure accessibility and clarity across
    teams.Bring your VIBE5–8 years of experience in digital brand design within agency,
    technology, fashion, or creative environments.Strong portfolio demonstrating corporate
    brand systems, presentation design, and digital web executions.Deep understanding
    of typography, layout systems, and digital brand consistency.Experience designing
    high-level executive presentations and commercial storytelling materials.Familiarity
    with responsive web design principles and digital brand implementation.Ability
    to translate business objectives into structured visual communication.Highly organized
    and systems-oriented with strong attention to detail.Strong collaborator who can
    work across creative and commercial teams.Experience within music, entertainment,
    or culturally driven brands preferred.Perks PlaylistJoin an entrepreneurial, global
    organization where authenticity, boldness, creativity, connection, drive, and
    insight aren’t just values—they’re how we work every day. Here are some of the
    ways we support you along the way (and just a few of the benefits we offer):Comprehensive
    medical, dental, and vision coverageIncluding 100% coverage for out-patient in-network
    mental health servicesFertility coverage for eligible medical plan participantsWellbeing
    reimbursements for fitness classes, spa treatments, meal services, travel, and
    so much more (up to $720/year)Student Loan Repayment Assistance and Tuition Reimbursement401(k)
    with 100% immediate vesting on the first 5% of your contributions, plus an additional
