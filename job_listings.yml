    through KOL outreach, expert calls, surveys/polling, and other proprietary data
    collection to support thesis formation and ongoing monitoring.Track and synthesize
    industry trends (pipeline activity, platform adoption, competitive read-throughs,
    regulatory/CMC expectations) and communicate actionable takeaways.Financial Analysis
    & ModelingBuild and maintain company financial models (forecasting, scenario analysis,
    valuation work) for use in updates, investment recommendations, and client discussions.Incorporate
    development-stage considerations into models (e.g., stage-based forecasting and
    key catalyst timing that can shift valuation outcomes).Writing, Publication &
